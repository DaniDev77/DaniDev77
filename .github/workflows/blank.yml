name: Generate Snake

on:
  # Roda automaticamente a cada 24 horas (meia-noite)
  schedule:
    - cron: "0 0 * * *"
  
  # Permite rodar manualmente a qualquer momento pela aba Actions
  workflow_dispatch:
  
  # Roda a cada push na branch main (opcional, mas bom para testar no início)
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação baseada nas contribuições do usuário
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Faz o deploy das imagens geradas para uma branch separada chamada 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
